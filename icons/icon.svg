<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!--
      Anneau centré à 256,256, r=168, stroke=72
      Bounding box y : 54..458 (hauteur 404)
      12h (gap start) : y=88 → 8.4% de la BB
      10h30 (gap end) : y≈136 → 20.3% de la BB
      Gradient : transparent jusqu'à ≈8%, puis monte vers vert vif jusqu'à 28%,
      puis vert profond en bas — fades les deux extrémités de l'anneau.
    -->
    <linearGradient id="ring" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#A8F040" stop-opacity="0"/>
      <stop offset="8%"   stop-color="#A8F040" stop-opacity="0"/>
      <stop offset="28%"  stop-color="#7AE620" stop-opacity="1"/>
      <stop offset="62%"  stop-color="#4ECC0C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3AB808" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Fond blanc avec coins arrondis iOS -->
  <rect width="512" height="512" rx="112" ry="112" fill="#ffffff"/>

  <!--
    Anneau : dasharray calculé pour un gap de ~44° centré à 11h15
    C = 2π×168 = 1055.6  |  gap 44° = 128.9  |  dash = 926.7
    rotate(-90) : le dessin commence à 12h et va dans le sens horaire
    → le gap tombe entre 10h33 et 12h00
  -->
  <circle
    cx="256" cy="256" r="168"
    fill="none"
    stroke="url(#ring)"
    stroke-width="72"
    stroke-linecap="round"
    stroke-dasharray="926 130"
    transform="rotate(-90 256 256)"
  />
</svg>
