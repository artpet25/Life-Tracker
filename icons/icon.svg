<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ringGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#b8f560" stop-opacity="0.08"/>
      <stop offset="30%"  stop-color="#74e828" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#3dc80e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#74e828" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="#f5f5f5"/>
  <!-- Green ring — gap centré sur 12h -->
  <circle cx="256" cy="256" r="168"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="66"
    stroke-linecap="round"
    stroke-dasharray="928 128"
    transform="rotate(-90 256 256)"/>
</svg>
