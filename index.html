<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Life Tracker">
<meta name="theme-color" content="#f2f2f7">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="manifest" href="manifest.json">
<title>Life Tracker</title>
<script src="js/app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { background: #f2f2f7; color: #1c1c1e; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; min-height: 100vh; overflow-x: hidden; }

  .wrap { max-width: 480px; margin: 0 auto; padding-bottom: 160px; }

  /* Top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 0; }
  .topbar-menu { background: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,0.09); border: none; cursor: pointer; font-size: 18px; color: #1c1c1e; line-height: 1; }
  .topbar-actions { display: flex; align-items: center; gap: 12px; background: white; border-radius: 24px; padding: 10px 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); }
  .topbar-action-btn { background: none; border: none; cursor: pointer; font-size: 18px; line-height: 1; display: flex; align-items: center; }
  .topbar-dots { font-size: 22px; color: #8e8e93; letter-spacing: 2px; line-height: 1; cursor: pointer; }

  /* Page title */
  .page-title { font-size: 36px; font-weight: 800; padding: 14px 20px 18px; color: #1c1c1e; letter-spacing: -0.5px; }

  /* Card */
  .section { margin: 0 16px 14px; }
  .card { background: white; border-radius: 20px; padding: 18px 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.05); }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid #f2f2f7; margin-bottom: 2px; }
  .card-title { font-size: 17px; font-weight: 600; color: #1c1c1e; }
  .card-count { display: flex; align-items: center; gap: 5px; color: #8e8e93; font-size: 16px; }

  /* Today habit items */
  @keyframes habitCheck { 0%{transform:scale(1)} 30%{transform:scale(1.45)} 60%{transform:scale(0.82)} 80%{transform:scale(1.1)} 100%{transform:scale(1)} }
  .habit-today-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid #f2f2f7; user-select: none; -webkit-user-select: none; }
  .habit-today-item:last-child { border-bottom: none; }
  .habit-icon-btn { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; border: none; cursor: pointer; transition: transform 0.1s; }
  .habit-icon-btn:active { transform: scale(0.88); }
  .habit-icon-btn.animating { animation: habitCheck 0.38s ease; }
  .habit-icon-btn.done-icon { font-size: 20px; font-weight: 700; color: #34c759; }
  .habit-today-name { flex: 1; font-size: 16px; font-weight: 500; color: #1c1c1e; }
  .habit-today-name.done-name { color: #8e8e93; text-decoration: line-through; }
  .pillar-tag { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .pillar-body { background: #e8f0ff; color: #0a84ff; }
  .pillar-mind { background: #f3e8ff; color: #bf5af2; }
  .pillar-spirit { background: #fff3e0; color: #ff9f0a; }
  .section-badge { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .badge-pending { background: #f2f2f7; color: #8e8e93; }
  .badge-done { background: #e8f5e9; color: #34c759; }
  .done-section-header { cursor: pointer; }
  .collapse-arrow { font-size: 20px; color: #8e8e93; display: inline-block; transition: transform 0.25s; transform: rotate(90deg); line-height: 1; }
  .collapse-arrow.open { transform: rotate(-90deg); }
  .collapsible-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
  .collapsible-body.open { max-height: 2000px; }
  .all-done-msg { text-align: center; padding: 18px 0 4px; font-size: 15px; color: #34c759; font-weight: 600; }

  /* FAB */
  .fab { position: fixed; bottom: 96px; right: 20px; width: 58px; height: 58px; background: #5856d6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; line-height: 1; box-shadow: 0 4px 20px rgba(88,86,214,0.45); border: none; cursor: pointer; z-index: 40; }
  .fab:active { opacity: 0.85; transform: scale(0.95); }

  /* Bottom nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 28px 28px 0 0; padding: 8px 10px; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 8px); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -4px 24px rgba(0,0,0,0.08); z-index: 50; }
  .nav-btn { display: flex; align-items: center; justify-content: center; width: 52px; height: 52px; border: none; background: none; cursor: pointer; border-radius: 16px; transition: background 0.2s; }
  .nav-btn.active { background: #5856d6; }
  .nav-btn svg { width: 24px; height: 24px; fill: none; stroke: #8e8e93; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-btn.active svg { stroke: white; }

  /* Tab panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Calendar panel */
  .calendar-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px 14px; }
  .calendar-month-nav { display: flex; align-items: center; gap: 8px; }
  .calendar-nav-btn { background: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); color: #1c1c1e; }
  .calendar-month-label { font-size: 16px; font-weight: 600; color: #1c1c1e; min-width: 150px; text-align: center; }
  .settings-btn { background: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); color: #1c1c1e; }
  .sheet { background: white; border-radius: 20px; margin: 0 16px; padding: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.05); }
  .ring-container { position: relative; width: 100%; aspect-ratio: 1; }
  svg { width: 100%; height: 100%; display: block; }
  .habits-list { position: absolute; left: 0; top: 0; width: 42%; height: 100%; pointer-events: none; z-index: 3; }
  .habit-line { position: absolute; left: 0; width: 100%; height: 0; pointer-events: auto; }
  .habit-line-inner { display: grid; grid-template-columns: 18px 1fr; align-items: end; gap: 3px; width: 100%; font-size: clamp(11px, 2.6vw, 15px); line-height: 1; transform: translateY(-100%); padding-bottom: 2px; padding-left: 4px; }
  .habit-num { font-weight: 700; text-align: right; padding-right: 2px; font-size: 11px; color: #8e8e93; }
  .habit-name { width: 100%; min-width: 0; font-size: inherit; background: transparent; border: none; color: #1c1c1e; font-weight: 500; padding: 0 2px 1px; }
  .habit-name:focus { outline: none; background: rgba(88,86,214,0.1); border-radius: 4px; }
  .habit-name::placeholder { color: #c7c7cc; }
  .center-month-label { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; z-index: 2; }
  .center-month-label .lbl { font-size: 10px; letter-spacing: 0.1em; color: #8e8e93; }
  .center-month-label .mo { font-size: clamp(14px,3.5vw,22px); font-weight: 700; color: #1c1c1e; margin-top: 2px; }
  .center-month-label .yr { font-size: clamp(12px,3vw,18px); font-weight: 500; color: #1c1c1e; margin-top: 2px; }
  .center-month-label .pct { font-size: 11px; color: #8e8e93; margin-top: 4px; }
  .day-num { font-size: 10px; fill: #1c1c1e; font-weight: 600; font-family: -apple-system, sans-serif; }
  .day-num-weekend { fill: #ff3b30; font-weight: 700; }
  .cell { cursor: pointer; transition: fill 0.12s ease; stroke: #e5e5ea; stroke-width: 0.7; }
  .cell-empty { fill: #f9f9f9; } .cell-empty-weekend { fill: #fff5f5; } .cell-done { fill: #34c759; } .cell-fail { fill: #ff3b30; }
  .cell-future { fill: #f2f2f7; cursor: not-allowed; opacity: 0.5; } .cell-future-weekend { fill: #f2f2f7; cursor: not-allowed; opacity: 0.5; }
  .legend { display: flex; gap: 16px; justify-content: center; margin-top: 14px; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: #8e8e93; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
  .cell.popping { animation: pop 0.22s ease; transform-origin: center; transform-box: fill-box; }
  .hint { text-align: center; font-size: 13px; color: #8e8e93; margin-top: 14px; line-height: 1.5; padding: 0 20px; }
  .loading { text-align: center; padding: 40px 20px; font-size: 16px; color: #8e8e93; }

  /* Fruits panel */
  .fruits-header-wrap { padding: 0 20px 16px; }
  .week-nav-row { display: flex; align-items: center; justify-content: space-between; }
  .week-label-big { font-size: 22px; font-weight: 700; color: #1c1c1e; }
  .week-dates-small { font-size: 12px; color: #8e8e93; margin-top: 2px; }
  .week-nav-btns { display: flex; gap: 8px; }
  .week-nav-btn { background: white; border: none; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); color: #1c1c1e; }
  .counter-big { background: white; border-radius: 20px; padding: 16px; margin: 0 16px 14px; box-shadow: 0 2px 16px rgba(0,0,0,0.05); }
  .counter-triple { display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr; gap: 10px; align-items: center; }
  .counter-triple .divider { background: #f2f2f7; height: 40px; width: 1px; justify-self: center; }
  .counter-big .num { font-size: 34px; font-weight: 700; color: #1c1c1e; line-height: 1; text-align: center; }
  .counter-big .num .goal { color: #8e8e93; font-size: 22px; }
  .counter-big .label { font-size: 11px; letter-spacing: 0.05em; color: #8e8e93; text-transform: uppercase; margin-top: 4px; text-align: center; }
  .progress-bar { margin-top: 14px; height: 6px; background: #f2f2f7; border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #34c759; border-radius: 3px; transition: width 0.3s ease; }
  .add-form-wrap { position: relative; margin: 0 16px 10px; }
  .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 0 0 16px 16px; max-height: 220px; overflow-y: auto; z-index: 10; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
  .suggestions.hidden { display: none; }
  .suggestion { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; font-size: 16px; border-bottom: 1px solid #f2f2f7; }
  .suggestion:last-child { border-bottom: none; }
  .suggestion:hover, .suggestion.highlighted { background: rgba(88,86,214,0.06); }
  .suggestion .emoji { font-size: 20px; flex-shrink: 0; }
  .suggestion .match { font-weight: 700; }
  .sugg-name { flex: 1; }
  .fruit-item .qty-badge { display: inline-block; background: #1c1c1e; color: white; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }
  .add-form { display: flex; gap: 8px; padding: 12px 14px; background: white; border-radius: 16px; margin-bottom: 10px; box-shadow: 0 2px 16px rgba(0,0,0,0.05); }
  .add-form input { flex: 1; font-size: 16px; background: transparent; border: none; color: #1c1c1e; min-width: 0; }
  .add-form input:focus { outline: none; }
  .add-form input::placeholder { color: #c7c7cc; }
  .add-form button { font-size: 14px; font-weight: 600; padding: 8px 16px; cursor: pointer; border: none; background: #5856d6; color: white; border-radius: 10px; flex-shrink: 0; }
  .add-form button:active { opacity: 0.8; }
  .fruits-list { padding: 0 16px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 8px; border-bottom: 2px solid #f2f2f7; }
  .section-header:first-child { margin-top: 0; }
  .section-title { font-size: 18px; font-weight: 700; color: #1c1c1e; }
  .section-count { font-size: 13px; font-weight: 600; color: #8e8e93; background: #f2f2f7; padding: 3px 10px; border-radius: 10px; }
  .fruit-item { display: grid; grid-template-columns: 24px 1fr auto 60px 32px; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #f2f2f7; font-size: 16px; }
  .fruit-item:last-child { border-bottom: none; }
  .fruit-item .type-toggle { background: none; border: 1px solid #e5e5ea; width: 28px; height: 28px; cursor: pointer; font-size: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.6; transition: opacity 0.15s; }
  .fruit-item .type-toggle:active { opacity: 1; }
  .fruit-item .idx { font-weight: 700; color: #8e8e93; font-size: 14px; text-align: right; }
  .fruit-item .name-wrap { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .fruit-item .emoji { font-size: 20px; flex-shrink: 0; }
  .fruit-item .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fruit-item .qty-controls { display: flex; align-items: center; gap: 4px; }
  .fruit-item .qty-btn { background: #f2f2f7; border: none; width: 26px; height: 26px; cursor: pointer; font-size: 15px; color: #1c1c1e; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .fruit-item .qty-btn:active { background: #5856d6; color: white; }
  .fruit-item .qty-num { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; color: #1c1c1e; }
  .fruit-item .del { background: none; border: 1px solid #ffe0e0; width: 26px; height: 26px; cursor: pointer; font-size: 14px; color: #ff3b30; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .fruit-item .del:active { background: #ff3b30; color: white; }
  .fruits-empty { text-align: center; padding: 30px 20px; font-size: 16px; color: #8e8e93; }
  .season-block { margin: 0 16px 14px; padding: 14px 14px 16px; background: linear-gradient(135deg,#e8f5e9 0%,#dcedc8 100%); border-radius: 16px; }
  .season-block-title { font-size: 16px; font-weight: 600; color: #2e7d32; margin-bottom: 10px; }
  .season-strip { display: flex; flex-wrap: wrap; gap: 6px; }
  .season-chip { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; background: rgba(255,255,255,0.85); border: none; border-radius: 20px; cursor: pointer; font-size: 14px; color: #1c1c1e; transition: all 0.15s; }
  .season-chip:active { background: #43a047; color: white; transform: scale(0.96); }
  .season-chip .emoji { font-size: 15px; }
  .season-empty { font-size: 14px; color: #43a047; font-style: italic; }
  .season-badge { font-size: 13px; margin-left: 2px; }
  .fruit-item.in-season { background: linear-gradient(to right,rgba(67,160,71,0.05),transparent 60%); }
  .fruit-item.in-season .name { color: #2e7d32; }

  /* Modal - slides up from bottom */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: white; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 -4px 30px rgba(0,0,0,0.15); padding-bottom: env(safe-area-inset-bottom, 0); }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid #f2f2f7; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 20px; font-weight: 700; color: #1c1c1e; }
  .modal-close { background: #f2f2f7; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; color: #8e8e93; display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .modal-body .info { font-size: 14px; color: #8e8e93; margin-bottom: 14px; }
  .edit-row { display: grid; grid-template-columns: 22px 1fr 36px; align-items: center; gap: 8px; padding: 6px 0; }
  .edit-row .n { font-size: 12px; color: #8e8e93; text-align: right; font-weight: 600; }
  .edit-row input { width: 100%; font-size: 16px; background: #f2f2f7; border: none; border-radius: 10px; padding: 10px 12px; color: #1c1c1e; }
  .edit-row input:focus { outline: none; background: #e8e8f0; }
  .edit-row .del { background: none; border: 1px solid #ffe0e0; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; color: #ff3b30; display: flex; align-items: center; justify-content: center; }
  .edit-row .del:active { background: #ff3b30; color: white; }
  .edit-row .del:disabled { opacity: 0.3; cursor: not-allowed; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid #f2f2f7; display: flex; gap: 10px; }
  .btn { flex: 1; font-size: 16px; font-weight: 600; padding: 14px 12px; cursor: pointer; border: none; border-radius: 14px; background: #f2f2f7; color: #1c1c1e; }
  .btn-primary { background: #5856d6; color: white; }
  .btn:active { opacity: 0.8; }
  .add-habit-btn { width: 100%; margin-top: 12px; font-size: 15px; font-weight: 600; padding: 13px; cursor: pointer; border: 2px dashed #c7c7cc; border-radius: 14px; background: transparent; color: #5856d6; }
  .add-habit-btn:active { background: rgba(88,86,214,0.06); }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <button class="topbar-menu">☰</button>
    <div class="topbar-actions">
      <button class="topbar-action-btn">💡</button>
      <span class="topbar-dots">•••</span>
    </div>
  </div>

  <div class="page-title" id="pageTitle">Aujourd'hui</div>

  <!-- Today panel (default) -->
  <div class="tab-panel active" id="panel-today">
    <div id="pendingSection" class="section"></div>
    <div id="doneSection" class="section"></div>
  </div>

  <!-- Calendar panel -->
  <div class="tab-panel" id="panel-calendar">
    <div class="calendar-header">
      <div class="calendar-month-nav">
        <button class="calendar-nav-btn" id="prevMonth">‹</button>
        <div class="calendar-month-label" id="monthLabel">—</div>
        <button class="calendar-nav-btn" id="nextMonth">›</button>
      </div>
      <button class="settings-btn" id="openSettings" title="Configurer les habitudes">⚙</button>
    </div>
    <div class="sheet">
      <div id="app" class="loading">Chargement…</div>
    </div>
    <div class="hint">Tape une case : 1× ✓ fait · 2× ✗ raté · 3× vide</div>
  </div>

  <!-- Fruits panel -->
  <div class="tab-panel" id="panel-fruits">
    <div class="fruits-header-wrap">
      <div class="week-nav-row">
        <div>
          <div class="week-label-big" id="weekLabel">S—</div>
          <div class="week-dates-small" id="weekDates">—</div>
        </div>
        <div class="week-nav-btns">
          <button class="week-nav-btn" id="prevWeek">‹</button>
          <button class="week-nav-btn" id="nextWeek">›</button>
        </div>
      </div>
    </div>
    <div class="counter-big">
      <div class="counter-triple">
        <div><div class="num"><span id="fruitsOnlyCount">0</span></div><div class="label">🍎 Fruits</div></div>
        <div class="divider"></div>
        <div><div class="num"><span id="veggiesCount">0</span></div><div class="label">🥕 Légumes</div></div>
        <div class="divider"></div>
        <div><div class="num"><span id="fruitsCount">0</span><span class="goal">/30</span></div><div class="label">Total</div></div>
      </div>
      <div class="progress-bar"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="season-block">
      <div class="season-block-title">🌱 De saison en <span id="seasonMonth">—</span></div>
      <div id="seasonStrip" class="season-strip"></div>
    </div>
    <div class="add-form-wrap">
      <div class="add-form">
        <input type="text" id="fruitInput" placeholder="Ajouter un fruit ou légume…" autocomplete="off" />
        <button id="addFruitBtn">Ajouter</button>
      </div>
      <div id="suggestions" class="suggestions hidden"></div>
    </div>
    <div id="fruitsList" class="fruits-list"></div>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fabBtn">+</button>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <!-- Today / Habits -->
  <button class="nav-btn active" data-tab="today">
    <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
  </button>
  <!-- Calendar -->
  <button class="nav-btn" data-tab="calendar">
